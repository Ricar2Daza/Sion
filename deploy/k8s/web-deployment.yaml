apiVersion: apps/v1
kind: Deployment
metadata:
  name: sion-web
  namespace: sion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sion-web
  template:
    metadata:
      labels:
        app: sion-web
    spec:
      containers:
        - name: web
          image: sion-web-client:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_INTERNAL_URL
              value: http://sion-api.sion.svc.cluster.local:4000/api/v1
            - name: NEXT_PUBLIC_API_URL
              value: https://app.ejemplo.com/api/v1
---
apiVersion: v1
kind: Service
metadata:
  name: sion-web
  namespace: sion
spec:
  selector:
    app: sion-web
  ports:
    - port: 3000
      targetPort: 3000
